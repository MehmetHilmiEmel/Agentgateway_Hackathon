# --- KEYCLOAK ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: mcp-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
      - name: keycloak
        image: quay.io/keycloak/keycloak:26.0
        command: ["/opt/keycloak/bin/kc.sh", "start-dev"]
        env:
        - name: KEYCLOAK_ADMIN
          value: "admin"
        - name: KEYCLOAK_ADMIN_PASSWORD
          value: "admin"
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak-service
  namespace: mcp-store
spec:
  type: LoadBalancer 
  selector:
    app: keycloak
  ports:
  - port: 8080
    targetPort: 8080

# --- JAEGER ---
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: mcp-store
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
      - name: jaeger
        image: jaegertracing/all-in-one:latest
        env:
        - name: COLLECTOR_OTLP_ENABLED
          value: "true"
        ports:
        - containerPort: 16686
        - containerPort: 4317
        - containerPort: 4318
---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-service
  namespace: mcp-store
spec:
  type: LoadBalancer 
  selector:
    app: jaeger
  ports:
  - name: ui
    port: 16686
    targetPort: 16686
  - name: otlp-grpc
    port: 4317
    targetPort: 4317
  - name: otlp-http
    port: 4318
    targetPort: 4318
