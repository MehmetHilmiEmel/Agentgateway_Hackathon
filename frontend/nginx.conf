server {
    listen 80;

    # Core API proxy
    location /api/ {
        proxy_pass http://core-api-service.mcp-store.svc.cluster.local:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Keycloak proxy
    location /auth/ {
        proxy_pass http://keycloak-service.mcp-store.svc.cluster.local:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Agent API proxy
    location /agent/ {
        proxy_pass http://agent-api-service.mcp-store.svc.cluster.local:8001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Frontend SPA
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }
}
